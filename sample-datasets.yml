# Sample dataset manifest for TypeDB clients (Studio, Cloud platform, etc.).
# Only TypeDB server versions >= 3.5.0 are covered.
# Clients may optionally include pre-release server builds (e.g. 3.8.0-alpha-1) in server ranges.
# This file should be updated when adding new datasets or releasing new versions of existing ones.
# URLs use raw.githubusercontent.com because browser clients can't consume github.com release URLs due to CORS.
# Do NOT delete this file - it is used by live clients.

schemaVersion: 1

datasets:
  bookstore:
    displayName: "Bookstore"
    description: "A simplified ecommerce model of a bookstore, with books, users, orders, reviews, and promotions."
    homepage: "https://github.com/typedb/typedb-examples/tree/master/use-cases/bookstore"
    versions:
      - version: "3.7.1"
        compatibleServers: ">=3.7.3"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.1/use-cases/bookstore/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.1/use-cases/bookstore/data.tql"
      - version: "3.7.0"
        compatibleServers: ">=3.7.0 <3.7.3"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.0/use-cases/bookstore/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.0/use-cases/bookstore/data.tql"
      - version: "3.5.5"
        compatibleServers: ">=3.5.5 <3.7.0"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.5/use-cases/bookstore/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.5/use-cases/bookstore/data.tql"
      - version: "3.5.2"
        compatibleServers: ">=3.5.2 <3.5.5"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.2/use-cases/bookstore/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.2/use-cases/bookstore/data.tql"
      - version: "3.5.1"
        compatibleServers: ">=3.5.1 <3.5.2"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.1/use-cases/bookstore/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.1/use-cases/bookstore/data.tql"
      - version: "3.5.0"
        compatibleServers: ">=3.5.0 <3.5.1"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.0/use-cases/bookstore/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.0/use-cases/bookstore/data.tql"

  cti:
    displayName: "Cyber Threat Intelligence"
    description: "A STIX 2.1-based model of threat actors, campaigns, and their relationships, demonstrating TypeDB in a CTI context."
    homepage: "https://github.com/typedb/typedb-examples/tree/master/use-cases/cyber-threat-intelligence"
    versions:
      - version: "3.7.1"
        compatibleServers: ">=3.7.3"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.1/use-cases/cyber-threat-intelligence/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.1/use-cases/cyber-threat-intelligence/data.tql"
      - version: "3.7.0"
        compatibleServers: ">=3.7.0 <3.7.3"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.0/use-cases/cyber-threat-intelligence/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.7.0/use-cases/cyber-threat-intelligence/data.tql"
      - version: "3.5.5"
        compatibleServers: ">=3.5.6 <3.7.0"
        schemaFile: "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.5/use-cases/cyber-threat-intelligence/schema.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb/typedb-examples/refs/tags/3.5.5/use-cases/cyber-threat-intelligence/data.tql"

  robotics:
    displayName: "Robotics"
    description: "A knowledge base for an autonomous robotic agent, based on a real-world application of TypeDB."
    homepage: "https://github.com/typedb-osi/typedb-robotics"
    versions:
      - version: "1.0.0"
        compatibleServers: ">=3.5.0"
        schemaFile: "https://raw.githubusercontent.com/typedb-osi/typedb-robotics/refs/tags/1.0.0/schema_floorplan.tql"
        dataFile:   "https://raw.githubusercontent.com/typedb-osi/typedb-robotics/refs/tags/1.0.0/data_floorplan_assignment.tql"
